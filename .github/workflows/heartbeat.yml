name: Daily Coding Tip

on:
  schedule:
    # Run 4x per day to be resilient against GitHub Actions delays.
    # The heartbeat script itself prevents duplicate insertions (once per UTC day).
    - cron: '0 0 * * *'   # Midnight UTC (primary)
    - cron: '0 6 * * *'   # 6AM UTC (retry if midnight failed)
    - cron: '0 12 * * *'  # Noon UTC (retry)
    - cron: '0 18 * * *'  # 6PM UTC (final retry)
  workflow_dispatch: # Manual trigger from GitHub UI at any time

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: ./app
        run: npm install pg dotenv

      - name: Run Heartbeat
        working-directory: ./app
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/heartbeat.js

      - name: Report Status
        if: always()
        run: echo "Heartbeat attempt completed at $(date -u)"
