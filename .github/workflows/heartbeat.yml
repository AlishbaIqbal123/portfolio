name: Daily Coding Tip

on:
  schedule:
    # Run 4x per day. The heartbeat script prevents duplicate insertions (once per UTC day).
    - cron: '0 0 * * *'   # Midnight UTC (primary)
    - cron: '0 6 * * *'   # 6AM UTC
    - cron: '0 12 * * *'  # Noon UTC
    - cron: '0 18 * * *'  # 6PM UTC
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Script Dependencies
        working-directory: scripts
        run: npm install

      - name: Run Heartbeat
        working-directory: scripts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node heartbeat.js

      - name: Report Status
        if: always()
        run: echo "Heartbeat attempt completed at $(date -u)"
